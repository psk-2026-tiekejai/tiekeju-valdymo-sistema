<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title><ui:insert name="title">Tiekeju valdymo sistema</ui:insert></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        body {
            background: #f7f9fc;
            color: #1f2937;
        }

        .app-header {
            background: #ffffff;
            border-bottom: 1px solid #d9e2ec;
        }

        .app-main {
            min-height: calc(100vh - 132px);
            padding: 2rem 0;
        }

        .app-footer {
            border-top: 1px solid #d9e2ec;
            color: #6b7280;
            font-size: 0.875rem;
        }
    </style>
</h:head>
<h:body>
    <header class="app-header">
        <div class="container d-flex align-items-center justify-content-between py-3">
            <h1 class="h4 mb-0">Tiekeju valdymo sistema</h1>
            <nav>
                <h:link outcome="/suppliers/list" value="Tiekejai" styleClass="btn btn-outline-primary btn-sm"/>
            </nav>
        </div>
    </header>

    <main class="app-main">
        <div class="container">
            <ui:insert name="content"/>
        </div>
    </main>

    <footer class="app-footer bg-white">
        <div class="container py-3">
            Tiekeju valdymo sistema
        </div>
    </footer>
</h:body>
</html>
