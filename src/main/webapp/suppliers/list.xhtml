<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="jakarta.faces.facelets"
                template="/template.xhtml">
    <ui:define name="title">Tiekejai</ui:define>

    <ui:define name="content">
        <h:form id="supplierListForm">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h2 class="h4 mb-0">Tiekejai</h2>
                <p:button outcome="/suppliers/edit"
                          value="Naujas tiekėjas"
                          icon="pi pi-plus"
                          styleClass="ui-button-success"/>
            </div>

            <p:dataTable id="suppliersTable"
                         value="#{supplierListBean.suppliers}"
                         var="supplier"
                         rowKey="#{supplier.id}"
                         emptyMessage="Tiekėjų nėra"
                         stripedRows="true"
                         paginator="true"
                         rows="10"
                         responsiveLayout="scroll">
                <p:column headerText="Pavadinimas" sortBy="#{supplier.name}">
                    <h:outputText value="#{supplier.name}"/>
                </p:column>

                <p:column headerText="Registracijos kodas" sortBy="#{supplier.registrationCode}">
                    <h:outputText value="#{supplier.registrationCode}"/>
                </p:column>

                <p:column headerText="El. paštas">
                    <h:outputText value="#{supplier.email}"/>
                </p:column>

                <p:column headerText="Telefonas">
                    <h:outputText value="#{supplier.phone}"/>
                </p:column>

                <p:column headerText="Sukurta" sortBy="#{supplier.createdAt}">
                    <h:outputText value="#{supplier.createdAt}"/>
                </p:column>

                <p:column headerText="" styleClass="text-end">
                    <p:button outcome="/suppliers/edit"
                              value="Redaguoti"
                              icon="pi pi-pencil"
                              styleClass="ui-button-secondary ui-button-sm">
                        <f:param name="id" value="#{supplier.id}"/>
                    </p:button>
                </p:column>
            </p:dataTable>
        </h:form>
    </ui:define>
</ui:composition>
